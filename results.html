<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Case Studies and Results | Turtle Mail</title>
<link rel="preconnect" href="https://googleapis.com">
<link rel="preconnect" href="https://gstatic.com" crossorigin>
<link href="https://googleapis.com/css2?family=Inter:wght@400;600;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-midnight: #0D1B2A;
  --bg-charcoal: #121214;
  --card-dark: #203243;
  --text-white: #E6F2FF;
  --text-muted: #86868b;
  --electric-cyan: #00F0FF;
  --border-gray: #1E293B;
}
body {
  font-family: 'Inter', sans-serif;
  background-color: var(--bg-charcoal);
  background-image: url('Turtle_Mail_Background.png');
  background-size: cover;
  background-position: center center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  color: var(--text-white);
  margin: 0;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  box-sizing: border-box;
}
.construction-container {
  width: 100%;
  max-width: 600px;
  background-color: rgba(32, 50, 67, 0.95);
  border: 1px solid var(--border-gray);
  border-radius: 12px;
  padding: 45px;
  text-align: center;
  backdrop-filter: blur(8px);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}
.tag {
  font-family: 'Syncopate', sans-serif;
  font-size: 12px;
  color: var(--electric-cyan);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 18px;
}
h1 {
  font-family: 'Syncopate', sans-serif;
  font-size: 22px;
  font-weight: 700;
  margin: 0 0 20px 0;
  letter-spacing: -0.01em;
}
.description {
  font-size: 14px;
  line-height: 1.7;
  color: rgba(230, 242, 255, 0.8);
  margin-bottom: 30px;
}
.btn-return {
  display: inline-block;
  background-color: var(--electric-cyan);
  color: var(--bg-charcoal);
  border: none;
  border-radius: 6px;
  padding: 14px 28px;
  font-size: 12px;
  font-weight: 700;
  text-decoration: none;
  font-family: 'Syncopate', sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
</style>
</head>
<body>

<div class="construction-container">
  <div class="tag">Under Construction</div>
  <h1>Case Studies and Results</h1>
  <p class="description">Real ROI stories from companies that turned trade show business cards into closed accounts using physical Turtle Mail follow-ups are coming soon.</p>
  <a href="/index.html" class="btn-return">Back to Home</a>

  <p style="margin-top:20px; font-size:11px;">
    <a href="/privacy.html" style="color: rgba(230,242,255,0.5); text-decoration:none;">Privacy</a> &middot;
    <a href="/terms.html" style="color: rgba(230,242,255,0.5); text-decoration:none;">Terms of Sale</a> &middot;
    <a href="/faq.html" style="color: rgba(230,242,255,0.5); text-decoration:none;">FAQ</a>
  </p>

  <!-- IDENTICAL HONEYPOT + RATE LIMITER TRAP (verbatim, per site-wide rule) -->
  <div style="display: none; tab-index: -1;" aria-hidden="true">
    <label for="website_secondary">Secondary Security Check Item Fields</label>
    <input type="text" id="website_secondary" name="website_secondary" autocomplete="off" oninput="interceptBillboardBotAttack()">
  </div>
</div>

<script>
let landingClickTimestamps = [];
document.addEventListener("DOMContentLoaded", () => {
    window.addEventListener("click", () => {
        const now = Date.now();
        landingClickTimestamps.push(now);
        landingClickTimestamps = landingClickTimestamps.filter(t => now - t < 5000);
        if (landingClickTimestamps.length > 20) {
            alert("Rapid interaction threshold exceeded. Protective security cooldown active.");
            window.location.href = "https://turtlemail.app";
        }
    });
});

function interceptBillboardBotAttack() {
    const triggerVal = document.getElementById("website_secondary").value;
    if (triggerVal) {
        console.warn("⚠️ Bot screening triggered on static landing node. Evacuating browser context.");
        window.location.href = "https://turtlemail.app";
    }
}
</script>
</body>
</html>
