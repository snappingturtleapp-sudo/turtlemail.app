<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Turtle Mail Batch Delivery</title>
    <style>
        body {
            /* FIXED: Added https:// and removed duplicate folder name */
            background-image: url('https://turtlemail.app');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            font-family: monospace;
        }

        .top-banner {
            width: 100%;
            text-align: center;
            padding: 20px 0;
            background-color: rgba(0, 0, 0, 0.4); 
        }

        .top-banner img {
            max-width: 600px; 
            height: auto;
        }

        .copter-assembly {
            position: absolute;
            top: 45%;               
            width: 300px;           
            animation: flyAcross 20s linear infinite; 
        }

        .copter-container {
            position: relative;
            width: 300px;  
            height: 300px; 
            animation: bobUpDown 1.8s ease-in-out infinite alternate;
        }

        .copter-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0; 
            animation: multiFrameLoop 70s infinite steps(1); 
        }

        .frame-1 { animation-delay: 0s; }
        .frame-2 { animation-delay: -10s; }
        .frame-3 { animation-delay: -20s; }
        .frame-4 { animation-delay: -30s; }
        .frame-5 { animation-delay: -40s; }
        .frame-6 { animation-delay: -50s; }
        .frame-7 { animation-delay: -60s; }

        .soi-text {
            color: #00ff00; 
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            margin-top: 15px;
            text-shadow: 2px 2px 4px #000000; 
            width: 100%;
        }

        @keyframes multiFrameLoop {
            0%, 14.28% { opacity: 1; }
            14.29%, 100% { opacity: 0; }
        }

        @keyframes flyAcross {
            0% { left: -350px; }
            100% { left: 100vw; }
        }

        @keyframes bobUpDown {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-40px); }
        }
    </style>
</head>
<body>

    <!-- FIXED: Corrected absolute URL path for banner -->
    <div class="top-banner">
        <img src="https://turtlemail.app" alt="Turtle Mail Banner">
    </div>

    <div class="copter-assembly">
        
        <!-- FIXED: Corrected absolute URL paths for all 7 mascots -->
        <div class="copter-container">
            <img class="frame-1" src="https://turtlemail.app" alt="Mascot 1">
            <img class="frame-2" src="https://turtlemail.app" alt="Mascot 2">
            <img class="frame-3" src="https://turtlemail.app" alt="Mascot 3">
            <img class="frame-4" src="https://turtlemail.app" alt="Mascot 4">
            <img class="frame-5" src="https://turtlemail.app" alt="Mascot 5">
            <img class="frame-6" src="https://turtlemail.app" alt="Mascot 6">
            <img class="frame-7" src="https://turtlemail.app" alt="Mascot 7">
        </div>

        <div class="soi-text">SOI SOI SOI</div>

    </div>

</body>
</html>
