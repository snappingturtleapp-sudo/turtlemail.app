<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Turtle Mail Batch Delivery</title>
    <style>
        body {
            background-image: url('https://turtlemail.app/Turtle_Mail_Background.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            font-family: monospace;
            min-height: 100vh;
        }

        .top-banner {
            width: 100%;
            text-align: center;
            padding: 20px 0;
            background-color: rgba(0, 0, 0, 0.4); 
        }

        .top-banner img {
            max-width: 600px; 
            height: auto;
        }

        .copter-assembly {
            position: absolute;
            top: 45%;               
            width: 300px;           
            animation: flyAcross 20s linear infinite; 
        }

        .copter-container {
            position: relative;
            width: 300px;  
            height: 300px; 
            animation: bobUpDown 1.8s ease-in-out infinite alternate;
        }

        /* Base configuration for all stacked mascot layers */
        .copter-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 300px;
            height: 300px;
            opacity: 0; 
            display: block;
            mix-blend-mode: screen; 
            /* Total animation length is 70 seconds (10s per image) */
            animation-duration: 70s;
            animation-iteration-count: infinite;
            animation-timing-function: steps(1);
        }

        /* FIXED: Each frame is tied directly to its own independent, custom visibility block */
        .frame-1 { animation-name: cycleFrame1; }
        .frame-2 { animation-name: cycleFrame2; }
        .frame-3 { animation-name: cycleFrame3; }
        .frame-4 { animation-name: cycleFrame4; }
        .frame-5 { animation-name: cycleFrame5; }
        .frame-6 { animation-name: cycleFrame6; }
        .frame-7 { animation-name: cycleFrame7; }

        .soi-text {
            color: #00F0FF; 
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            margin-top: 15px;
            text-shadow: 2px 2px 4px #000000, 0 0 8px rgba(0, 240, 255, 0.5); 
            width: 100%;
        }

        /* TIMELINE STAGES (Each active block is 14.28% of 70s, which equals 10 seconds) */
        @keyframes cycleFrame1 {
            0%, 14.28% { opacity: 1; }
            14.29%, 100% { opacity: 0; }
        }
        @keyframes cycleFrame2 {
            0%, 14.28% { opacity: 0; }
            14.29%, 28.57% { opacity: 1; }
            28.58%, 100% { opacity: 0; }
        }
        @keyframes cycleFrame3 {
            0%, 28.57% { opacity: 0; }
            28.58%, 42.85% { opacity: 1; }
            42.86%, 100% { opacity: 0; }
        }
        @keyframes cycleFrame4 {
            0%, 42.85% { opacity: 0; }
            42.86%, 57.14% { opacity: 1; }
            57.15%, 100% { opacity: 0; }
        }
        @keyframes cycleFrame5 {
            0%, 57.14% { opacity: 0; }
            57.15%, 71.42% { opacity: 1; }
            71.43%, 100% { opacity: 0; }
        }
        @keyframes cycleFrame6 {
            0%, 71.42% { opacity: 0; }
            71.43%, 85.71% { opacity: 1; }
            85.72%, 100% { opacity: 0; }
        }
        @keyframes cycleFrame7 {
            0%, 85.71% { opacity: 0; }
            85.72%, 100% { opacity: 1; }
        }

        @keyframes flyAcross {
            0% { left: -350px; }
            100% { left: 100vw; }
        }

        @keyframes bobUpDown {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-40px); }
        }
    </style>
</head>
<body>

    <div class="top-banner">
        <img src="https://turtlemail.app/turtle-mail-banner.png" alt="Turtle Mail Banner">
    </div>

    <div class="copter-assembly">
        
        <div class="copter-container">
            <img class="frame-1" src="https://turtlemail.app/mascot1.png" alt="Mascot 1">
            <img class="frame-2" src="https://turtlemail.app/mascot2.png" alt="Mascot 2">
            <img class="frame-3" src="https://turtlemail.app/mascot3.png" alt="Mascot 3">
            <img class="frame-4" src="https://turtlemail.app/mascot4.png" alt="Mascot 4">
            <img class="frame-5" src="https://turtlemail.app/mascot5.png" alt="Mascot 5">
            <img class="frame-6" src="https://turtlemail.app/mascot6.png" alt="Mascot 6">
            <img class="frame-7" src="https://turtlemail.app/mascot7.png" alt="Mascot 7">
        </div>

        <div class="soi-text">TM TM TM TM TM TM TM</div>

    </div>

</body>
</html>
