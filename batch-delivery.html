<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Turtle Mail Batch Delivery</title>
    <style>
        body {
            /* FIXED: Cleared double https://, corrected .png extension, and balanced closing quote */
            background-image: url('https://turtlemail.app/Turtle_Mail_Background.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            font-family: monospace;
            min-height: 100vh;
        }

        .top-banner {
            width: 100%;
            text-align: center;
            padding: 20px 0;
            background-color: rgba(0, 0, 0, 0.4); 
        }

        .top-banner img {
            max-width: 600px; 
            height: auto;
        }

        /* Combined horizontal flight animation tracking */
        .copter-assembly {
            position: absolute;
            top: 45%;               
            width: 300px;           
            animation: flyAcross 20s linear infinite; 
        }

        /* Combined vertical bobbing flight mechanics */
        .copter-container {
            position: relative;
            width: 300px;  
            height: 300px; 
            animation: bobUpDown 1.8s ease-in-out infinite alternate;
        }

        /* FIXED: Added strict sizing values to force images to stack directly on top of each other */
        .copter-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 300px;
            height: 300px;
            opacity: 0; 
            display: block;
            animation: multiFrameLoop 70s infinite steps(1); 
        }

        /* Staggering frame layout matrix */
        .frame-1 { animation-delay: 0s; }
        .frame-2 { animation-delay: -10s; }
        .frame-3 { animation-delay: -20s; }
        .frame-4 { animation-delay: -30s; }
        .frame-5 { animation-delay: -40s; }
        .frame-6 { animation-delay: -50s; }
        .frame-7 { animation-delay: -60s; }

        /* Branded text alignment styling */
        .soi-text {
            color: #00F0FF; /* Electric Cyan overlay to match the glow of your turtle shell */
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            margin-top: 15px;
            text-shadow: 2px 2px 4px #000000, 0 0 8px rgba(0, 240, 255, 0.5); 
            width: 100%;
        }

        @keyframes multiFrameLoop {
            0%, 14.28% { opacity: 1; }
            14.29%, 100% { opacity: 0; }
        }

        @keyframes flyAcross {
            0% { left: -350px; }
            100% { left: 100vw; }
        }

        @keyframes bobUpDown {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-40px); }
        }
    </style>
</head>
<body>

    <!-- Main Navigation Header -->
    <div class="top-banner">
        <img src="https://turtlemail.app/turtle-mail-banner.png" alt="Turtle Mail Banner">
    </div>

    <!-- Active Flight Rig -->
    <div class="copter-assembly">
        
        <!-- Ordered Carousel Array -->
        <div class="copter-container">
            <img class="frame-1" src="https://turtlemail.app/mascot1.png" alt="Mascot 1">
            <img class="frame-2" src="https://turtlemail.app/mascot2.png" alt="Mascot 2">
            <img class="frame-3" src="https://turtlemail.app/mascot3.png" alt="Mascot 3">
            <img class="frame-4" src="https://turtlemail.app/mascot4.png" alt="Mascot 4">
            <img class="frame-5" src="https://turtlemail.app/mascot5.png" alt="Mascot 5">
            <img class="frame-6" src="https://turtlemail.app/mascot6.png" alt="Mascot 6">
            <img class="frame-7" src="https://turtlemail.app/mascot7.png" alt="Mascot 7">
        </div>

        <!-- FIXED: Implemented your clean trademark typography string -->
        <div class="soi-text">TM TM TM TM TM TM TM TM TM</div>

    </div>

</body>
</html>
