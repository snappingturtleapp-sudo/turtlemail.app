<script> 
let recipientCount = 0; 
let finalizedRecipientsList = []; 
let imageAssetsArray = [null, null, null, null, null]; 
let activeSlotIndex = null; 

const dropZone = document.getElementById('csv-drop-zone'); 
const fileInput = document.getElementById('csv-file-input'); 
const nativeFileInput = document.getElementById('universal-image-input'); 

function switchIngestionMode(mode) { 
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active')); 
  document.querySelectorAll('.ingestion-content').forEach(content => content.classList.remove('active')); 
  
  if(mode === 'manual') { 
    document.querySelector("button[onclick*='manual']").classList.add('active'); 
    document.getElementById('mode-manual').classList.add('active'); 
    syncManualRecipient(); 
  } else { 
    document.querySelector("button[onclick*='bulk']").classList.add('active'); 
    document.getElementById('mode-bulk').classList.add('active'); 
    recipientCount = 0; 
    finalizedRecipientsList = []; 
    updateReviewLedgerMetrics(); 
  } 
} 

function syncManualRecipient() { 
  const name = document.getElementById('manual-name').value.trim(); 
  const street = document.getElementById('manual-street').value.trim(); 
  const city = document.getElementById('manual-city').value.trim(); 
  const state = document.getElementById('manual-state').value.trim(); 
  const zip = document.getElementById('manual-zip').value.trim(); 

  if (name || street || city || state || zip) { 
    // Single manual inputs are strictly restricted to the United States (US)
    finalizedRecipientsList = [{ 
      name: name || "Recipient", 
      street, 
      city, 
      state, 
      zip,
      country: "US" 
    }]; 
    recipientCount = 1; 
  } else { 
    finalizedRecipientsList = []; 
    recipientCount = 0; 
  } 
  updateReviewLedgerMetrics(); 
} 

if(dropZone) { 
  dropZone.addEventListener('click', () => fileInput.click()); 
  fileInput.addEventListener('change', (e) => { 
    if (e.target.files.length > 0) processCSVFileString(e.target.files[0]); 
  }); 
  ['dragenter', 'dragover'].forEach(name => dropZone.addEventListener(name, () => dropZone.classList.add('dragover'), false)); 
  ['dragleave', 'drop'].forEach(name => dropZone.addEventListener(name, () => dropZone.classList.remove('dragover'), false)); 
  dropZone.addEventListener('drop', (e) => { 
    e.preventDefault(); 
    const files = e.dataTransfer.files; 
    if (files.length > 0) processCSVFileString(files[0]); 
  }); 
} 

function processCSVFileString(file) { 
  if (!file.name.endsWith('.csv')) { 
    alert("Please load a valid .csv file."); 
    return; 
  } 
  dropZone.innerText = `Reading File: ${file.name}...`; 
  const reader = new FileReader(); 
  reader.onload = async function(event) { 
    const textPayload = event.target.result; 
    const honeypotVal = document.getElementById('website_secondary').value; 
    try { 
      const response = await fetch('/api/batch/parse-csv', { 
        method: 'POST', 
        headers: { 'Content-Type': 'application/json' }, 
        body: JSON.stringify({ csv_data_string: textPayload, website_secondary: honeypotVal }) 
      }); 
      const parsedResult = await response.json(); 
      recipientCount = parsedResult.quantity || 0; 
      finalizedRecipientsList = parsedResult.verified_recipients || []; 
      updateReviewLedgerMetrics(); 
      dropZone.innerText = `✓ Processed: ${file.name}`; 
    } catch (error) { 
      dropZone.innerText = "Error loading spreadsheet."; 
    } 
  }; 
  reader.readAsText(file); 
} 

function updateReviewLedgerMetrics() { 
  document.getElementById('batch-qty').innerText = `${recipientCount} Address(es) Configured`; 
  
  // GEOPOLITICAL TIERCED PRICING PREVIEW ENGINE
  let calculatedUnitPrice = 100.00; // Default: Rest of World Tier ($100)
  
  if (finalizedRecipientsList.length > 0) {
    const countries = finalizedRecipientsList.map(r => (r.country || 'US').toUpperCase().trim());
    const adversarialTriggers = ['RU', 'IR', 'KP', 'RUSSIA', 'IRAN', 'NORTH KOREA', 'GAZA'];
    const hasAdversarial = countries.some(c => adversarialTriggers.includes(c));

    if (hasAdversarial) {
      calculatedUnitPrice = 1000.00; // Adversarial Tier ($1,000)
    } else {
      const isDomesticOnly = countries.every(c => c === 'US' || c === 'GB' || c === 'UK');
      if (isDomesticOnly) {
        calculatedUnitPrice = 25.00; // Core Secure Hub Tier ($25)
      }
    }
  } else {
    calculatedUnitPrice = 0.00;
  }

  document.getElementById('total-amount').innerText = `$${(recipientCount * calculatedUnitPrice).toFixed(2)}`; 
} 

function triggerSlotBrowser(index) { 
  activeSlotIndex = index; 
  nativeFileInput.click(); 
} 

nativeFileInput.addEventListener('change', (e) => { 
  if (e.target.files.length > 0 && activeSlotIndex !== null) processSelectedImage(e.target.files[0], activeSlotIndex); 
}); 

[0, 1, 2, 3, 4].forEach(index => { const slot = document.getElementById(`slot-container-${index}`); if(slot) { slot.addEventListener('dragover', (e) => { e.preventDefault(); slot.classList.add('dragover'); }); slot.addEventListener('dragleave', () => slot.classList.remove('dragover')); slot.addEventListener('drop', (e) => { e.preventDefault(); slot.classList.remove('dragover'); if (e.dataTransfer.files.length > 0) processSelectedImage(e.dataTransfer.files[0], index); }); } }); 

function processSelectedImage(file, index) { 
  if (!file.type.startsWith('image/')) { 
    alert("Please select an image file."); 
    return; 
  } 
  const reader = new FileReader(); 
  reader.onload = function(event) { 
    imageAssetsArray[index] = event.target.result; 
    const previewImg = document.getElementById(`preview-${index}`); 
    previewImg.src = event.target.result; 
    previewImg.style.display = 'block'; 
  }; 
  reader.readAsDataURL(file); 
} 

async function triggerStripeCheckout() { 
  const email = document.getElementById('corporate-email').value; 
  const po = document.getElementById('po-number').value; 
  const honeypotVal = document.getElementById('website_secondary').value; 

  if (honeypotVal) { 
    window.location.href = '/checkout.html'; 
    return; 
  } 
  if (!email) { 
    alert("Please supply a valid corporate email reference."); 
    return; 
  } 
  if (recipientCount < 1) { 
    alert("Please define recipient targets before initiating checkout."); 
    return; 
  } 
  const loadedAssetsCount = imageAssetsArray.filter(x => x !== null).length; 
  if (loadedAssetsCount !== 5) { 
    alert(`Production array boundary failure: Exactly 5 image assets required. Currently loaded: ${loadedAssetsCount}`); 
    return; 
  } 

  // Collect destination country parameters into an array loop to transmit to Stripe
  const uniqueCountries = [...new Set(finalizedRecipientsList.map(r => r.country || 'US'))];

  // Send payload to backend creation route
  try {
    const response = await fetch('/api/orders/create', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        organization_id: 'org_checkout_session', // Automatically matches session parameters
        purchase_order_number: po,
        quantity: recipientCount,
        countries: uniqueCountries
      })
    });
    const result = await response.json();
    if (result.checkout_url) {
      window.location.href = result.checkout_url;
    } else {
      alert("Failed to compile secure checkout pathway.");
    }
  } catch (error) {
    alert("Network infrastructure routing failure.");
  }
} 
</script> 
</body> 
</html>
