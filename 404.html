<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- B2B COMPLIANT ROBOTS TAG: Prevents scrapers from indexing broken links -->
<meta name="robots" content="noindex, nofollow">
<title>404: Routing Gateway Exception | Turtle Mail</title>
<!-- Universal Corporate Readable Font System -->
<link rel="preconnect" href="https://googleapis.com">
<link rel="preconnect" href="https://gstatic.com" crossorigin>
<link href="https://googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
<style>
/* BRAND PALETTE INTERPOLATION */
:root {
  --bg-midnight: #0D1B2A;
  --bg-charcoal: #121214;
  --card-dark: #203243;
  --text-white: #E6F2FF;
  --electric-cyan: #00F0FF;
  --border-gray: #1E293B;
}
body {
  font-family: 'Inter', sans-serif;
  background-color: var(--bg-charcoal);
  background-image: url('Turtle_Mail_Background.png');
  background-size: cover;
  background-position: center center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  color: var(--text-white);
  margin: 0;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  box-sizing: border-box;
}
.error-container {
  width: 100%;
  max-width: 600px;
  background-color: rgba(32, 50, 67, 0.95);
  border: 1px solid var(--border-gray);
  border-radius: 12px;
  padding: 45px;
  text-align: center;
  backdrop-filter: blur(8px);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}
.error-code {
  font-family: 'Syncopate', sans-serif;
  font-size: 84px;
  font-weight: 700;
  color: var(--electric-cyan);
  margin: 0 0 10px 0;
  letter-spacing: -0.04em;
  text-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
}
.error-header {
  font-family: 'Syncopate', sans-serif;
  font-size: 14px;
  color: var(--text-white);
  margin-bottom: 25px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
/* Error Text Block Elements */
.error-description {
  font-size: 15px;
  line-height: 1.7;
  color: rgba(230, 242, 255, 0.8);
  margin-bottom: 35px;
  font-weight: 500;
}
.btn-return {
  display: inline-block;
  background-color: var(--electric-cyan);
  color: var(--bg-charcoal);
  border: none;
  border-radius: 6px;
  padding: 16px 32px;
  font-size: 12px;
  font-weight: 700;
  text-decoration: none;
  font-family: 'Syncopate', sans-serif;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  transition: opacity 0.2s, transform 0.1s;
  box-shadow: 0 4px 15px rgba(0, 240, 255, 0.2);
}
.btn-return:hover {
  opacity: 0.95;
}
.btn-return:active {
  transform: scale(0.98);
}
.system-seal {
  margin-top: 40px;
  border-top: 1px solid var(--border-gray);
  padding-top: 20px;
  font-size: 11px;
  color: rgba(230, 242, 255, 0.4);
  font-family: 'Syncopate', sans-serif;
  letter-spacing: 0.05em;
}
</style>
</head>
<body>

<div class="error-container">
  <div class="error-code">404</div>
  <div class="error-header">Routing Exception</div>
  
  <p class="error-description">
    The requested system path has broken context alignment or has expired. All logistical data transmission pathways on Turtle Mail are dynamically session-isolated and transient.
  </p>
  
  <a href="/index.html" class="btn-return">Return To Landing Engine</a>
  
  <div class="system-seal">
    🔒 TURTLE MAIL B2B SECURE GATEWAY
  </div>
</div>

</body>
